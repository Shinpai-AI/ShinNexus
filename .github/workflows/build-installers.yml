name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install appimagetool
        run: |
          wget -q -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          mkdir -p ShinNexus.AppDir/usr/share/shinnexus
          cp ShinNexus.py requirements.txt start.sh shinnexus-tray.py ShinNexus.AppDir/usr/share/shinnexus/ 2>/dev/null || true
          cp *.png *.webp *.json ShinNexus.AppDir/usr/share/shinnexus/ 2>/dev/null || true
          cp installer/linux/AppRun ShinNexus.AppDir/AppRun
          chmod +x ShinNexus.AppDir/AppRun
          cp installer/linux/shinnexus.desktop ShinNexus.AppDir/
          # Convert logo to PNG for icon
          python3 -c "from PIL import Image; Image.open('ShinNexus-Logo.webp').save('ShinNexus.AppDir/shinnexus.png')" 2>/dev/null || cp ShinNexus-Shield-edel.png ShinNexus.AppDir/shinnexus.png
          ln -sf shinnexus.png ShinNexus.AppDir/.DirIcon
          ARCH=x86_64 ./appimagetool --no-appstream ShinNexus.AppDir ShinNexus-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: ShinNexus-Linux-AppImage
          path: ShinNexus-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y

      - name: Build liboqs from source
        shell: pwsh
        run: |
          git clone --depth 1 --branch main https://github.com/open-quantum-safe/liboqs.git
          cd liboqs; mkdir build; cd build
          cmake -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX="$env:GITHUB_WORKSPACE/liboqs-install" ..
          cmake --build . --config Release
          cmake --install . --config Release
          cd $env:GITHUB_WORKSPACE

      - name: Create Windows Installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "installer-build" -Force
          # Embedded Python
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.12.8/python-3.12.8-embed-amd64.zip" -OutFile "python-embed.zip"
          Expand-Archive -Path "python-embed.zip" -DestinationPath "installer-build/python" -Force
          (Get-Content "installer-build/python/python312._pth") -replace '#import site','import site' | Set-Content "installer-build/python/python312._pth"
          # Install deps (ohne liboqs-python)
          New-Item -ItemType Directory -Path "installer-build/python/Lib/site-packages" -Force
          pip install pyotp qrcode Pillow edge-tts cryptography hdwallet bitcoin-utils pystray --target "installer-build/python/Lib/site-packages" --no-warn-script-location
          # liboqs-python manuell
          git clone --depth 1 https://github.com/open-quantum-safe/liboqs-python.git liboqs-py-src
          Copy-Item -Path "liboqs-py-src/oqs" -Destination "installer-build/python/Lib/site-packages/oqs" -Recurse
          Get-ChildItem "$env:GITHUB_WORKSPACE/liboqs-install" -Recurse -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName -Destination "installer-build/python/Lib/site-packages/oqs/" -ErrorAction SilentlyContinue
            Copy-Item $_.FullName -Destination "installer-build/python/" -ErrorAction SilentlyContinue
          }
          # Patch oqs.py
          python installer/windows/patch_oqs.py "installer-build/python/Lib/site-packages/oqs"
          # App files
          Copy-Item "ShinNexus.py","requirements.txt","start.sh","shinnexus-tray.py" -Destination "installer-build/" -ErrorAction SilentlyContinue
          Copy-Item "*.png","*.webp","*.json","*.ico" -Destination "installer-build/" -ErrorAction SilentlyContinue
          # Logo explizit kopieren (für Tray-Icon und Installer)
          Copy-Item "shinnexus.png" -Destination "installer-build/" -ErrorAction SilentlyContinue
          Copy-Item "shinnexus.ico" -Destination "installer-build/" -ErrorAction SilentlyContinue
          # Logo auch als PNG konvertieren falls nur webp vorhanden
          if (-not (Test-Path "installer-build/shinnexus.png")) {
            python -c "from PIL import Image; Image.open('ShinNexus-Logo.webp').convert('RGBA').save('installer-build/shinnexus.png')"
          }
          Copy-Item "installer/windows/shinnexus-setup.iss" -Destination "." -ErrorAction SilentlyContinue

      - name: Build with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: shinnexus-setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: ShinNexus-Windows-Setup
          path: Output/*.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ShinNexus-Linux-AppImage/ShinNexus-x86_64.AppImage
            ShinNexus-Windows-Setup/*.exe
          generate_release_notes: true
          body: |
            ## Installation

            ### Linux
            Download `ShinNexus-x86_64.AppImage`, make executable (`chmod +x`), run it. Zenity installer dialog guides you through setup.

            ### Windows
            Download `ShinNexus-Setup.exe` and run it. Includes embedded Python — no system Python needed. Configures firewall, creates desktop shortcut and system tray icon.
